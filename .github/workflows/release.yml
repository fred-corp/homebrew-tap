name: Update formula on new release

on:
  repository_dispatch:
    types: [new-release]

  workflow_dispatch:
    inputs:
      version:
        description: "Version to pull (e.g. 1.0.4 — without the leading v)"
        required: true
      tool:
        description: "Tool name"
        required: true
        default: "eeprom-sign"

jobs:
  update-formula:
    name: Update ${{ github.event.client_payload.tool || inputs.tool }} formula
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Resolve tool and version
        id: vars
        run: |
          TOOL="${{ github.event.client_payload.tool || inputs.tool }}"
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          OWNER="${{ github.event.client_payload.owner || github.repository_owner }}"

          # Strip leading "v" so version is always bare e.g. "1.0.4" not "v1.0.4"
          VERSION="${VERSION#v}"

          echo "tool=$TOOL"       >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "owner=$OWNER"     >> $GITHUB_OUTPUT

          echo "Updating formula for $TOOL v$VERSION (owner: $OWNER)"

      - name: Download binaries and compute SHA-256
        id: sha
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TOOL:     ${{ steps.vars.outputs.tool }}
          VERSION:  ${{ steps.vars.outputs.version }}
          OWNER:    ${{ steps.vars.outputs.owner }}
        run: |
          BASE_URL="https://github.com/${OWNER}/${TOOL}/releases/download/v${VERSION}"

          for ARCH in arm64; do
            BINARY="${TOOL}-macos-${ARCH}"
            echo "Downloading $BASE_URL/$BINARY"
            curl -fsSL \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              "$BASE_URL/$BINARY" -o "$BINARY"

            SHA=$(shasum -a 256 "$BINARY" | awk '{print $1}')
            echo "sha256_${ARCH}=$SHA" >> $GITHUB_OUTPUT
            echo "SHA-256 ($ARCH): $SHA"
          done

      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Patch formula
        env:
          TOOL:        ${{ steps.vars.outputs.tool }}
          VERSION:     ${{ steps.vars.outputs.version }}
          OWNER:       ${{ steps.vars.outputs.owner }}
          SHA_ARM64:   ${{ steps.sha.outputs.sha256_arm64 }}
          SHA_X86_64:  ${{ steps.sha.outputs.sha256_x86_64 }}
        run: |
          FORMULA="Formula/${TOOL}.rb"

          if [ ! -f "$FORMULA" ]; then
            echo "ERROR: $FORMULA not found in tap repo."
            exit 1
          fi

          # Update version
          sed -i "s|version  \".*\"|version  \"${VERSION}\"|" "$FORMULA"

          # Update URLs for both architectures
          sed -i "s|releases/download/v[0-9.]\+/${TOOL}-macos-arm64|releases/download/v${VERSION}/${TOOL}-macos-arm64|g" "$FORMULA"
          sed -i "s|releases/download/v[0-9.]\+/${TOOL}-macos-x86_64|releases/download/v${VERSION}/${TOOL}-macos-x86_64|g" "$FORMULA"

          # Update sha256 for arm64 — the first sha256 line in the file
          # Use a Python one-liner for reliable multi-line sed behaviour
          python3 - << PYEOF
          import re, os

          content = open("${FORMULA}").read()

          # Replace arm64 sha256 (appears inside the if Hardware::CPU.arm? block)
          content = re.sub(
              r'(if Hardware::CPU\.arm\?.*?sha256 ")[a-f0-9]{64}(")',
              r'\g<1>${SHA_ARM64}\2',
              content, flags=re.DOTALL
          )

          # Replace x86_64 sha256 (appears inside the else block)
          content = re.sub(
              r'(else.*?sha256 ")[a-f0-9]{64}(")',
              r'\g<1>${SHA_X86_64}\2',
              content, flags=re.DOTALL
          )

          open("${FORMULA}", "w").write(content)
          print("Patched sha256 values")
          PYEOF

          echo "--- Updated formula ---"
          cat "$FORMULA"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          commit-message: "${{ steps.vars.outputs.tool }} ${{ steps.vars.outputs.version }}"
          branch: "update/${{ steps.vars.outputs.tool }}-${{ steps.vars.outputs.version }}"
          delete-branch: true
          title: "Update ${{ steps.vars.outputs.tool }} to v${{ steps.vars.outputs.version }}"
          body: |
            Automated formula update.

            - **Tool:** `${{ steps.vars.outputs.tool }}`
            - **Version:** `${{ steps.vars.outputs.version }}`
            - **SHA-256 (arm64):** `${{ steps.sha.outputs.sha256_arm64 }}`
            - **SHA-256 (x86_64):** `${{ steps.sha.outputs.sha256_x86_64 }}`
          labels: automated, formula-update