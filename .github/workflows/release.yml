name: Update formula on new release

on:
  repository_dispatch:
    types: [new-release]

  workflow_dispatch:
    inputs:
      version:
        description: "Version to pull (e.g. 1.0.7 — without the leading v)"
        required: true
      tool:
        description: "Tool name"
        required: true
        default: "eeprom-sign"

jobs:
  update-formula:
    name: Update ${{ github.event.client_payload.tool || inputs.tool }} formula
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Resolve tool and version
        id: vars
        run: |
          TOOL="${{ github.event.client_payload.tool || inputs.tool }}"
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          OWNER="${{ github.event.client_payload.owner || github.repository_owner }}"
          VERSION="${VERSION#v}"   # strip leading "v"
          echo "tool=$TOOL"       >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "owner=$OWNER"     >> $GITHUB_OUTPUT
          echo "Updating formula for $TOOL v$VERSION (owner: $OWNER)"

      - name: Download binaries and compute SHA-256
        id: sha
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TOOL:     ${{ steps.vars.outputs.tool }}
          VERSION:  ${{ steps.vars.outputs.version }}
          OWNER:    ${{ steps.vars.outputs.owner }}
        run: |
          BASE_URL="https://github.com/${OWNER}/${TOOL}/releases/download/v${VERSION}"

          # Download every binary variant that exists on this release.
          # Add or remove entries here when you add/drop platforms.
          declare -A BINARIES=(
            [macos-arm64]="${TOOL}-macos-arm64"
            [linux-aarch64]="${TOOL}-linux-aarch64"
            [linux-x86_64]="${TOOL}-linux-x86_64"
          )

          for KEY in "${!BINARIES[@]}"; do
            BINARY="${BINARIES[$KEY]}"
            URL="$BASE_URL/$BINARY"
            echo "Downloading $URL"

            HTTP_CODE=$(curl -fsSL \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              -w "%{http_code}" \
              "$URL" -o "$BINARY" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "000" ] || [ ! -s "$BINARY" ]; then
              echo "  ⚠️  $BINARY not found on release — skipping"
              rm -f "$BINARY"
              continue
            fi

            SHA=$(shasum -a 256 "$BINARY" | awk '{print $1}')
            # Normalise key for GITHUB_OUTPUT (replace - with _)
            SAFE_KEY="${KEY//-/_}"
            echo "sha256_${SAFE_KEY}=$SHA" >> $GITHUB_OUTPUT
            echo "  SHA-256 ($KEY): $SHA"
          done

      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Patch formula
        env:
          TOOL:                 ${{ steps.vars.outputs.tool }}
          VERSION:              ${{ steps.vars.outputs.version }}
          SHA_MACOS_ARM64:      ${{ steps.sha.outputs.sha256_macos_arm64 }}
          SHA_LINUX_AARCH64:    ${{ steps.sha.outputs.sha256_linux_aarch64 }}
          SHA_LINUX_X86_64:     ${{ steps.sha.outputs.sha256_linux_x86_64 }}
        run: |
          FORMULA="Formula/${TOOL}.rb"
          [ -f "$FORMULA" ] || { echo "ERROR: $FORMULA not found"; exit 1; }

          python3 << 'PYEOF'
          import os, re

          formula   = os.environ["FORMULA"]
          tool      = os.environ["TOOL"]
          version   = os.environ["VERSION"]

          # Map: binary suffix → env var holding the new sha256
          sha_map = {
              f"{tool}-macos-arm64"   : os.environ.get("SHA_MACOS_ARM64",   ""),
              f"{tool}-linux-aarch64" : os.environ.get("SHA_LINUX_AARCH64", ""),
              f"{tool}-linux-x86_64"  : os.environ.get("SHA_LINUX_X86_64",  ""),
          }

          content = open(formula).read()

          # 1. Update version line
          content = re.sub(r'version\s+"[^"]+"', f'version  "{version}"', content)

          # 2. For each binary, update its url and the sha256 on the very next line.
          #    Pattern: url line containing the binary name, then optional whitespace
          #    lines, then the sha256 line.
          for binary, new_sha in sha_map.items():
              if not new_sha:
                  print(f"  skipping {binary} (no sha256 available)")
                  continue

              # Update version in url
              content = re.sub(
                  rf'(url\s+"https://[^"]+/releases/download/v)[^/]+(/{re.escape(binary)}")',
                  rf'\g<1>{version}\2',
                  content
              )

              # Replace the sha256 immediately after the url for this binary.
              # Matches: url line with binary name, then captures everything up to
              # the next sha256 line, then replaces just the hash value.
              content = re.sub(
                  rf'(url\s+"[^"]*{re.escape(binary)}[^"]*"[^\n]*\n(?:[^\n]*\n)*?\s*sha256\s+")[a-f0-9]{{64}}(")',
                  rf'\g<1>{new_sha}\2',
                  content
              )
              print(f"  patched {binary} → {new_sha}")

          open(formula, "w").write(content)
          print("Done.")
          PYEOF

          echo "--- Updated formula ---"
          cat "$FORMULA"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          commit-message: "${{ steps.vars.outputs.tool }} ${{ steps.vars.outputs.version }}"
          branch: "update/${{ steps.vars.outputs.tool }}-${{ steps.vars.outputs.version }}"
          delete-branch: true
          title: "Update ${{ steps.vars.outputs.tool }} to v${{ steps.vars.outputs.version }}"
          body: |
            Automated formula update.

            - **Tool:** `${{ steps.vars.outputs.tool }}`
            - **Version:** `${{ steps.vars.outputs.version }}`
            - **SHA-256 (macos-arm64):** `${{ steps.sha.outputs.sha256_macos_arm64 }}`
            - **SHA-256 (linux-aarch64):** `${{ steps.sha.outputs.sha256_linux_aarch64 }}`
            - **SHA-256 (linux-x86_64):** `${{ steps.sha.outputs.sha256_linux_x86_64 }}`
          labels: automated, formula-update